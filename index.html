<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        header {
            display: flex;
            justify-content: space-between;
        }

        nav {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: black;
        }

        nav a:hover {
            color: blue;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Дарина Решетова</div>
        <nav>
            <a href="#">Головна</a>
            <a href="#">Про мене</a>
            <a href="#">Послуги</a>
            <a href="#">Блог</a>
            <a href="#">Контакти</a>
        </nav>
    </header>

    <main>
        <section class="services-section">
            
            <article class="card-item">
                <img src="./images/design.jpg" alt="Послуга 1" class="card-image">
                <h3 class="card-title">Веб-дизайн</h3>
                <p class="card-description">Створення сучасних та адаптивних макетів для вашого бізнесу.</p>
                <button class="card-button">Детальніше</button>
            </article>

            <article class="card-item">
                <img src="./images/developer.jpg" alt="Послуга 2" class="card-image">
                <h3 class="card-title">Розробка</h3>
                <p class="card-description">Якісне програмування та інтеграція складних веб-систем.</p>
                <button class="card-button">Детальніше</button>
            </article>

            <article class="card-item">
                <img src="./images/marketing.jpg" alt="Послуга 3" class="card-image">
                <h3 class="card-title">Маркетинг</h3>
                <p class="card-description">Просування вашого продукту та залучення нових клієнтів.</p>
                <button class="card-button">Детальніше</button>
            </article>

        </section>
    </main>
</body>

</html>
