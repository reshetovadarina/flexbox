<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        header {
            display: flex;
            justify-content: space-between;
        }

        nav {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: black;
        }

        nav a:hover {
            color: blue;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Дарина Решетова</div>
        <nav>
            <a href="#">Головна</a>
            <a href="#">Про мене</a>
            <a href="#">Послуги</a>
            <a href="#">Блог</a>
            <a href="#">Контакти</a>
        </nav>
    </header>
</body>

</html>
